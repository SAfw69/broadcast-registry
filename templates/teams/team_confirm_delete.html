{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center mt-4"><div class="col-md-5">
  <div class="card p-4 text-center">
    <i class="bi bi-exclamation-triangle-fill fs-1 text-danger mb-3"></i>
    <h4 class="fw-bold">Disband Team?</h4>
    <p class="text-muted">Are you sure you want to disband <strong>{{ team.name }}</strong>? This action cannot be undone.</p>
    <form method="post" class="d-flex gap-3 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger fw-bold">Yes, Disband</button>
      <a href="{% url 'team_detail' team.pk %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div></div>
{% endblock %}
