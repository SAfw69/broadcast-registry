{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <h3 class="fw-bold mb-4">{{ action }} Department</h3>
  <div class="card p-4">
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">{{ field.label }}</label>{{ field }}
        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
      </div>{% endfor %}
      <button type="submit" class="btn btn-primary">{{ action }} Department</button>
      <a href="{% url 'department_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div></div>{% endblock %}
